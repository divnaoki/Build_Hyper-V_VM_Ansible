---
# set_vm_disk ローカル検証用 playbook
# 実行: ansible-playbook test_set_vm_disk.yml
# 前提:
#   - testvm01(windows) / testvm02(rhel) が Hyper-V ホスト上に存在。
#   - set_vm_disk はゲスト内パーティション拡張を含むため、対象VMは「起動済み」であること（start_vm 後を想定）。
#   - group_vars のゲスト管理パスワードはダミー。実機検証前に実値へ差し替えること。
- name: 検証 - set_vm_disk
  hosts: hyperv_hosts
  gather_facts: false
  vars_files:
    - roles/set_vm_disk/group_vars/main.yml
  roles:
    - set_vm_disk
