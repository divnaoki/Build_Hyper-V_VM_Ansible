---
# 種別: ストレージ構成（OSディスク拡張）
# 対象: Hyper-Vホスト（WinRM）。ホスト側でVHDXを拡張し、ゲスト内パーティションを最大まで拡張する。
# 配置: start_vm の後（ゲスト内拡張にVM起動が必須なため。HW設定はVM停止中という他ロールの原則の例外）。
#
# モジュール方針:
#   - VHDX拡張は冪等モジュール microsoft.hyperv.hv_vhd（size_bytes は拡張のみ）を使用。
#   - VHDXパス/サイズの取得（read）やゲスト内パーティション拡張（PowerShell Direct）は
#     hypervコレクションに該当モジュールが無いため ansible.windows.win_shell を使用。
#
# 前提（SHOULD-4: 明示）:
#   - OS(ブート)ディスクは Generation2 / SCSI 接続前提。VM起動中の hv_vhd 拡張（オンライン拡張）を用いる。
#     → Gen1/IDE の場合はオンライン拡張不可。start_vm 前にVHDX拡張を分離する設計へ変更が必要（残課題）。
#   - 本ロールは「データディスク未追加」を前提とし、OSディスク = 接続中ディスクの先頭
#     （ControllerNumber, ControllerLocation 昇順の先頭）とみなす。データディスク追加ロールを
#     本ロールより前に置く場合は OSディスク特定方法の見直しが必要。
#   - ゲスト内拡張は PowerShell Direct（Invoke-Command -VMName）で実施し、ゲストNWに依存しない。
#   - ゲスト内拡張は Windows のみ（item.os_type == 'windows'）。RHEL は VHDX 拡張のみ行い、ゲスト内はスキップ
#     （configure_vm_network と同様、ゲスト内処理は Windows 専用とする precedent に従う。Linux拡張は残課題）。
#
# 冪等性:
#   - hv_vhd の size_bytes は拡張のみ（既に同等以上なら changed=false）。縮小は行わない。
#   - ゲスト内も現サイズ < サポート最大サイズ のときのみ Resize-Partition。
# 前後取得: ホスト側は Get-VHD でVHDXサイズ(GB)、ゲスト側は Get-Partition でボリュームサイズ(GB)を before/after 取得。
# 機密(SHOULD-5): ゲスト資格情報を含むタスク（疎通待ち・拡張実行）は no_log:true。
#   ただし検証(assert)・エビデンス(debug)は no_log を付けず、register済みの結果からVM名・前後サイズ・失敗理由を可視化する。
# 変数: VAR_vm。item.os_disk_size_gb / os_disk_drive_letter / os_type / guest_admin_user / guest_admin_password。

# --- 1. OS(ブート)ディスク VHDX のパスを取得する（read / hv_vhd の path に渡す） ---
- name: OSディスクVHDXのパスを取得する
  ansible.windows.win_shell: |
    (Get-VMHardDiskDrive -VMName '{{ item.name }}' | Sort-Object ControllerNumber, ControllerLocation | Select-Object -First 1).Path
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: os_disk
  changed_when: false

# --- 2. 事前確認(before)：VHDX の現在サイズ(GB) ---
- name: OSディスクVHDXの現在サイズを取得する（before）
  ansible.windows.win_shell: "[math]::Round((Get-VHD -Path '{{ os_disk.results[idx].stdout | trim }}').Size / 1GB, 0)"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
  register: disk_before
  changed_when: false

# --- 3. 変更(ホスト)：VHDXを目標サイズへ拡張（hv_vhd・冪等・拡張のみ） ---
- name: OSディスクVHDXを目標サイズへ拡張する（hv_vhd）
  microsoft.hyperv.hv_vhd:
    path: "{{ os_disk.results[idx].stdout | trim }}"
    size_bytes: "{{ item.os_disk_size_gb }}GB"
    state: present
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
  register: vhd_resize

# --- 4. 事後確認(after)：VHDX の拡張後サイズ(GB) ---
- name: OSディスクVHDXの拡張後サイズを取得する（after）
  ansible.windows.win_shell: "[math]::Round((Get-VHD -Path '{{ os_disk.results[idx].stdout | trim }}').Size / 1GB, 0)"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
  register: disk_after
  changed_when: false

# --- 5. 正常性検証：VHDXが目標サイズ以上になっていること ---
- name: VHDXが目標サイズ以上であることを検証する
  ansible.builtin.assert:
    that:
      - "(disk_after.results[idx].stdout | trim | int) >= (item.os_disk_size_gb | int)"
    fail_msg: "VHDX拡張に失敗しました: {{ item.name }}（after={{ disk_after.results[idx].stdout | trim }}GB / target={{ item.os_disk_size_gb }}GB）"
    success_msg: "VHDXは目標サイズ以上です: {{ item.name }}（{{ disk_after.results[idx].stdout | trim }}GB）"
    quiet: true
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx

# --- 6. [MUST-1] ゲストOSの起動完了（PowerShell Direct疎通）を待機する（Windowsのみ） ---
# start_vm 直後はゲストOSが起動途中で Invoke-Command -VMName が失敗しうるため、疎通できるまでリトライする。
# hypervコレクションに該当モジュールが無いため win_shell（PowerShell Direct）を使用。
- name: ゲストOSのPowerShell Direct疎通を待機する（Windowsのみ）
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    Invoke-Command -VMName '{{ item.name }}' -Credential $cred -ScriptBlock { 'READY' }
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: guest_ready
  until: guest_ready is succeeded and 'READY' in (guest_ready.stdout | default(''))
  retries: 30
  delay: 10
  changed_when: false
  no_log: true

# --- 7. [MUST-2/3] 変更(ゲスト)：ディスク再スキャン → パーティションを最大まで拡張（Windowsのみ・冪等） ---
# Update-Disk でオンライン拡張をゲストに認識させた上で、before/after/SizeMax/blocked をJSONで返す。
# blocked = 拡張後サイズが目標未満（末尾に未割当が無い／回復パーティションが末尾にある等）の検知フラグ。
# hypervコレクションに該当モジュールが無いため win_shell（PowerShell Direct）を使用。
- name: ゲスト内のOSパーティションを最大まで拡張する（Windowsのみ）
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    Invoke-Command -VMName '{{ item.name }}' -Credential $cred -ArgumentList '{{ item.os_disk_drive_letter }}', {{ item.os_disk_size_gb }} -ScriptBlock {
      param($dl, $targetGb)
      $ErrorActionPreference = 'Stop'
      $part = Get-Partition -DriveLetter $dl
      Update-Disk -Number $part.DiskNumber
      $before = (Get-Partition -DriveLetter $dl).Size
      $max    = (Get-PartitionSupportedSize -DriveLetter $dl).SizeMax
      $changed = $false
      $err = ''
      if ($before -lt $max) {
        try { Resize-Partition -DriveLetter $dl -Size $max; $changed = $true }
        catch { $err = $_.Exception.Message }
      }
      $after = (Get-Partition -DriveLetter $dl).Size
      # 成功条件: after >= before（拡張された or 冪等で同サイズ）。after < before（縮小）のみ異常とする。
      $blocked = ($after -lt $before)
      [pscustomobject]@{
        before_gb = [math]::Round($before / 1GB, 1)
        after_gb  = [math]::Round($after / 1GB, 1)
        max_gb    = [math]::Round($max / 1GB, 1)
        target_gb = $targetGb
        changed   = $changed
        blocked   = $blocked
        error     = $err
      } | ConvertTo-Json -Compress
    }
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: guest_expand
  changed_when: "'\"changed\":true' in (stdout | default(''))"
  # no_log: true

# --- 8. [MUST-2/3] ゲスト内拡張結果の検証（Windowsのみ・no_log無しで失敗理由を可視化） ---
- name: ゲスト内パーティション拡張が目標に達したことを検証する（Windowsのみ）
  ansible.builtin.assert:
    that:
      - "not ((guest_expand.results[idx].stdout | trim | from_json).blocked | bool)"
    fail_msg: >-
      ゲスト内ディスクが縮小しています（異常）: {{ item.name }}
      (drive {{ item.os_disk_drive_letter }}:
      before={{ (guest_expand.results[idx].stdout | trim | from_json).before_gb }}GB
      after={{ (guest_expand.results[idx].stdout | trim | from_json).after_gb }}GB)
      err={{ (guest_expand.results[idx].stdout | trim | from_json).error }}
    success_msg: "ゲスト内ディスク拡張OK: {{ item.name }}（{{ (guest_expand.results[idx].stdout | trim | from_json).after_gb }}GB）"
    quiet: true
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx

# --- 9. エビデンス出力：VHDX前後差分＋ゲスト内ボリューム前後差分 ---
- name: OSディスク拡張の前後差分をエビデンス出力する
  ansible.builtin.debug:
    msg:
      - "vm     : {{ item.name }}"
      - "vhd    : {{ disk_before.results[idx].stdout | trim }}GB -> {{ disk_after.results[idx].stdout | trim }}GB (target={{ item.os_disk_size_gb }}GB, changed={{ vhd_resize.results[idx].changed }})"
      - "guest  : {{ ('drive ' ~ item.os_disk_drive_letter ~ ': ' ~ (guest_expand.results[idx].stdout | trim | from_json).before_gb ~ 'GB -> ' ~ (guest_expand.results[idx].stdout | trim | from_json).after_gb ~ 'GB (changed=' ~ (guest_expand.results[idx].stdout | trim | from_json).changed ~ ')') if item.os_type == 'windows' else 'skipped (os_type=' ~ item.os_type ~ ')' }}"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
