---
# configure_guest_network ロール 既定値（複数セグメント対応）
# 前提: 各セグメントの仮想NIC（VLAN設定含む）はテンプレート作成時に追加・VLAN割当済み（マウント済み）であること。
# 本ロールは vNIC の作成・VLAN設定は行わず、以下を行う（Windowsのみ）:
#   1) 各セグメントの vlan_id に一致するアクセスVLANの既存vNICをホスト側で特定し MAC を取得
#   2) ゲスト内で各NIC（MACで特定）に各セグメントのIPを設定
#   3) ホスト名を VM名（item.name）に設定（変更時は再起動）
# 接続はすべて PowerShell Direct（Invoke-Command -VMName）。
#
# 参照する VAR_vm メンバー:
#   - name                       ホスト名としても使用（NetBIOS: 15文字以内・英数推奨）
#     os_type: windows
#     guest_admin_user: "Administrator"     PowerShell Direct用
#     guest_admin_password: "********"        同上・機密(no_log)
#     segments:                               セグメント定義（複数）
#       - vlan_id: 10         テンプレートで設定済みのアクセスVLAN ID（これでvNICを特定する）
#         ip: "192.168.10.2"
#         prefix: 24
#         gateway: ""         既定GW（不要なら空文字。複数セグメントでは設定は1つに限定推奨）
#         dns: []             DNS（リスト。空なら未設定）
VAR_vm: []
