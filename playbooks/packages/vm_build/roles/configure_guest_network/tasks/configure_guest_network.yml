---
# 種別: ゲストOS構成（固定3セグメントIP：サーバLAN / 管理LAN / バックアップLAN）
# 対象: Hyper-Vホスト（WinRM）。ゲスト内設定は PowerShell Direct（Invoke-Command -VMName）で実施。
# 前提: 各LANの仮想NICはテンプレート作成時に追加・仮想スイッチ接続済み（マウント済み）。
#       LANと仮想スイッチは1:1（VLANは使用しない）。1つのスイッチに接続するvNICはVMごとに1つ。
#       本ロールはvNICの作成・スイッチ接続は行わず、各LANの接続先スイッチ（switch_map）に一致する
#       既存vNICをMACで特定して各LANのIPを設定する。
# 構成: LAN種別→接続先スイッチ名の対応は switch_map（defaults/main.yml・環境固定）で解決。
#       ip/prefix は Exastro 代入値（segments）から取得する。
# 冪等性: 現在IPが目標と一致なら変更しない。
# 機密: 資格情報を含むタスクは no_log:true。検証(assert)・エビデンス(debug)は register結果から可視化。
# 変数:
#   VAR_vm[]  : item.name / guest_admin_user / guest_admin_password / segments[0]
#   segments[0]（Exastro代入値・固定キー）:
#     sv_lan_ip / sv_lan_prefix / mgmt_lan_ip / mgmt_lan_prefix / bk_lan_ip / bk_lan_prefix
#   switch_map（defaults・環境固定）: sv_lan / mgmt_lan / bk_lan → 接続先の仮想スイッチ名

# --- 1. ゲストOSのPowerShell Direct疎通を待機する ---
- name: ゲストOSのPowerShell Direct疎通を待機する
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    # ゲスト管理者の資格情報を組み立てる（平文パスワードをSecureString化してPSCredentialを生成）
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    # PowerShell Direct（VMバス経由・ネットワーク不要）でゲスト内にコマンドを送り、'READY' が返れば疎通OKとみなす。
    # ゲストOS起動直後は PowerShell Direct 自体が失敗するため、この結果を until でリトライ判定に使う。
    Invoke-Command -VMName '{{ item.name }}' -Credential $cred -ScriptBlock { 'READY' }
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: guest_ready
  # 'READY' が取れるまで最大 30回 × 10秒 ＝ 約5分待機する（起動待ち）
  until: guest_ready is succeeded and 'READY' in (guest_ready.stdout | default(''))
  retries: 30
  delay: 10
  changed_when: false
  # no_log: true

# --- 2. LAN種別→スイッチ名でvNICをMAC特定（ホスト）＋ ゲスト内で各LANのIPを設定 ---
# switch_map で各LAN（サーバ/管理/バックアップ）の接続先スイッチ名を解決し、そのスイッチに接続された
# 既存vNICのMACをホスト側で取得。PowerShell Direct でゲスト内のMAC一致NICにIPを設定し、結果をJSONで返す。
- name: 固定3LAN（サーバ/管理/バックアップ）のIPを設定する
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $vm = '{{ item.name }}'
    # このVMの代入値（segments 配列の先頭要素。sv_lan_ip 等の固定キーを持つ）をJSON経由で展開する。
    # ヒアドキュメント（@' '@）で囲むことで、値内の記号やクォートをそのまま安全に渡す。
    $seg = @'
    {{ item.segments[0] | to_json }}
    '@ | ConvertFrom-Json
    # LAN種別→接続先スイッチ名の固定マッピング（environment依存の定数）を展開する。
    $map = @'
    {{ switch_map | to_json }}
    '@ | ConvertFrom-Json

    # 固定キーの代入値を、共通処理しやすいよう「LAN種別・スイッチ名・IP・プレフィックス」の内部リストに正規化する。
    # スイッチ名は switch_map から、IP/プレフィックスは代入値(segments)から取る。prefix はint化しておく（New-NetIPAddress用）。
    $lans = @(
      [pscustomobject]@{ lan='sv_lan';   switch=$map.sv_lan;   ip=$seg.sv_lan_ip;   prefix=[int]$seg.sv_lan_prefix },
      [pscustomobject]@{ lan='mgmt_lan'; switch=$map.mgmt_lan; ip=$seg.mgmt_lan_ip; prefix=[int]$seg.mgmt_lan_prefix },
      [pscustomobject]@{ lan='bk_lan';   switch=$map.bk_lan;   ip=$seg.bk_lan_ip;   prefix=[int]$seg.bk_lan_prefix }
    )

    # 1) ホスト側で、各LANのスイッチ名に一致する既存vNICを探しMACアドレスを収集する（vNICの作成・スイッチ接続はしない）。
    #    ゲスト内ではNIC名が一定しないため、ホスト側で確定できる「MACアドレス」を突き合わせキーとして使う。
    #    LAN=スイッチ1:1前提のため、一致vNICが 0個（未接続）または 2個以上（多重接続）なら構成不正として throw し、
    #    誤ったNICに黙ってIPを振ることを防ぐ。
    $payload = @()
    foreach ($s in $lans) {
      $match = @(Get-VMNetworkAdapter -VMName $vm | Where-Object { $_.SwitchName -eq $s.switch })
      if ($match.Count -eq 0) { throw "LAN '$($s.lan)' のスイッチ '$($s.switch)' に接続されたvNICが見つかりません（テンプレートで接続済みのはず）: $vm" }
      if ($match.Count -gt 1) { throw "LAN '$($s.lan)' のスイッチ '$($s.switch)' に複数のvNICが接続されています（1スイッチ1vNIC前提。テンプレート構成を確認）: $vm" }
      # ゲストに渡す最小限の情報（LAN種別／スイッチ名／MAC／設定IP／プレフィックス長）を1件ずつ積む
      $payload += [pscustomobject]@{ lan = $s.lan; switch = $s.switch; mac = $match[0].MacAddress; ip = $s.ip; prefix = $s.prefix }
    }

    # 2) 収集したMAC＋IP情報をゲスト内に渡し、PowerShell Direct 経由でMAC一致のNICにIPを設定する。
    #    Invoke-Command の -ArgumentList は文字列で渡すのが安全なため、payload を一旦JSON文字列化して受け渡す。
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    $payloadJson = $payload | ConvertTo-Json -Compress
    Invoke-Command -VMName $vm -Credential $cred -ArgumentList $payloadJson -ScriptBlock {
      param($payloadJson)
      $ErrorActionPreference = 'Stop'
      # ホストから渡ったJSONをゲスト側でオブジェクトに戻す。
      # 要素が1件だとConvertFromでスカラーになりforeachが回らないため、配列へ正規化する。
      $items = $payloadJson | ConvertFrom-Json
      if ($items -isnot [System.Array]) { $items = @($items) }
      $changed = $false   # 1つでもIP変更が発生したか（changed_when 判定に使う）
      $out = @()          # LANごとの結果（前後IP・成否）を貯めるエビデンス配列
      foreach ($it in $items) {
        # MACアドレスの区切り記号（- や :）を除去し大文字化して、ゲスト内NICと突き合わせる
        $macN = ($it.mac -replace '[-:]', '').ToUpper()
        $nic = Get-NetAdapter | Where-Object { ($_.MacAddress -replace '[-:]', '').ToUpper() -eq $macN } | Select-Object -First 1
        # 該当MACのNICが見つからなければ、このLANは失敗として記録し次へ（他LANの設定は続行）
        if (-not $nic) { $out += [pscustomobject]@{ lan = $it.lan; switch = $it.switch; ok = $false; err = "NIC not found (MAC=$($it.mac))" }; continue }
        $ifIndex = $nic.ifIndex
        # 設定前の現IPを控える（冪等性判定とエビデンス用）
        $before  = (Get-NetIPAddress -InterfaceIndex $ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue | Select-Object -First 1).IPAddress
        # 冪等性: 現IPが目標と一致していれば何もしない。異なる場合のみ既存IPv4を除去してから新規IPを付与する。
        if ($before -ne $it.ip) {
          Get-NetIPAddress -InterfaceIndex $ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue | Remove-NetIPAddress -Confirm:$false -ErrorAction SilentlyContinue
          New-NetIPAddress -InterfaceIndex $ifIndex -IPAddress $it.ip -PrefixLength $it.prefix | Out-Null
          $changed = $true
        }
        # 設定後IPを再取得し、目標IPが実際に付いているか（ok）を確認してエビデンスに残す
        $after = (Get-NetIPAddress -InterfaceIndex $ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue | Where-Object { $_.IPAddress -eq $it.ip } | Select-Object -First 1).IPAddress
        $out += [pscustomobject]@{ lan = $it.lan; switch = $it.switch; mac = $it.mac; before = $before; after = $after; ok = ($after -eq $it.ip) }
      }
      # 全LANの結果と変更有無をJSONで返す（ホスト側の assert / debug / changed_when がこれを解析する）
      [pscustomobject]@{ segments = $out; changed = $changed } | ConvertTo-Json -Compress -Depth 5
    }
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
  register: guest_net
  changed_when: '''"changed":true'' in (stdout | default(''''))'
  no_log: true

# --- 3. 全LANのIP設定が成功したことを検証する ---
- name: 全LANのIP設定を検証する
  ansible.builtin.assert:
    that:
      - "((guest_net.results[idx].stdout | from_json).segments | selectattr('ok', 'equalto', false) | list | length) == 0"
    fail_msg: >-
      一部LANのIP設定に失敗しました: {{ item.name }}
      / 詳細: {{ (guest_net.results[idx].stdout | from_json).segments }}
    success_msg: "全LAN IP設定OK: {{ item.name }}"
    quiet: true
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx

# --- 4. エビデンス出力（LAN別の前後） ---
- name: 固定3LAN設定の結果をエビデンス出力する
  ansible.builtin.debug:
    msg:
      - "vm       : {{ item.name }}"
      - "segments : {{ (guest_net.results[idx].stdout | from_json).segments }}"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
