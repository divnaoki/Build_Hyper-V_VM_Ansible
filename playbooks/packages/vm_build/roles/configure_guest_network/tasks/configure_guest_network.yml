---
# 種別: ゲストOS構成（複数セグメントIP＋ホスト名）
# 対象: Hyper-Vホスト（WinRM）。ゲスト内設定は PowerShell Direct（Invoke-Command -VMName）で実施。
# 前提: 各セグメントの仮想NICはテンプレート作成時に追加・仮想スイッチ接続済み（マウント済み）。
#       セグメントと仮想スイッチは1:1（VLANは使用しない）。1つのスイッチに接続するvNICはVMごとに1つ。
#       本ロールはvNICの作成・スイッチ接続は行わず、segments[].switch_name に一致する接続先スイッチの
#       既存vNICをMACで特定して各セグメントのIPを設定する。
# 構成: 各セグメントの switch_name に一致する既存vNICのMACをホスト側で取得し、ゲスト内でMAC一致のNICにIPを設定。ホスト名は VM名。
# 対象OS: Windows のみ（item.os_type == 'windows'）。
# 冪等性: 現在IP・ホスト名が目標と一致なら変更しない。
# 機密: 資格情報を含むタスクは no_log:true。検証(assert)・エビデンス(debug)は register結果から可視化。
# 変数: VAR_vm。item.name / os_type / guest_admin_user / guest_admin_password / segments[]（switch_name / ip / prefix / gateway / dns）

# --- 1. ゲストOSのPowerShell Direct疎通を待機する（Windowsのみ） ---
- name: ゲストOSのPowerShell Direct疎通を待機する（Windowsのみ）
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    Invoke-Command -VMName '{{ item.name }}' -Credential $cred -ScriptBlock { 'READY' }
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: guest_ready
  until: guest_ready is succeeded and 'READY' in (guest_ready.stdout | default(''))
  retries: 30
  delay: 10
  changed_when: false
  # no_log: true

# --- 2. switch_name一致の既存vNICをMAC特定（ホスト）＋ ゲスト内で各セグメントIP・ホスト名を設定（Windowsのみ） ---
# segments[].switch_name に一致する接続先スイッチの既存vNICを探してMACを取得し、
# PowerShell Direct でゲスト内のMAC一致NICにIPを設定する。結果（各セグメントの前後・成否）をJSONで返す。
- name: 複数セグメントのIP・ホスト名を設定する（Windowsのみ）
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $vm = '{{ item.name }}'
    $segs = @'
    {{ item.segments | to_json }}
    '@ | ConvertFrom-Json

    # 1) 各セグメントの switch_name に一致する既存vNICのMACを収集する（作成・スイッチ接続はしない）
    #    セグメント=スイッチ1:1前提のため、同一スイッチに複数vNICが接続されている場合は構成不正として fail する
    $payload = @()
    foreach ($s in $segs) {
      $match = @(Get-VMNetworkAdapter -VMName $vm | Where-Object { $_.SwitchName -eq $s.switch_name })
      if ($match.Count -eq 0) { throw "スイッチ '$($s.switch_name)' に接続されたvNICが見つかりません（テンプレートで接続済みのはず）: $vm" }
      if ($match.Count -gt 1) { throw "スイッチ '$($s.switch_name)' に複数のvNICが接続されています（1スイッチ1vNIC前提。テンプレート構成を確認）: $vm" }
      $payload += [pscustomobject]@{ switch = $s.switch_name; mac = $match[0].MacAddress; ip = $s.ip; prefix = $s.prefix; gateway = $s.gateway; dns = $s.dns }
    }

    # 2) ゲスト内で各NIC（MAC特定）にIP設定＋ホスト名設定
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    $payloadJson = $payload | ConvertTo-Json -Compress
    Invoke-Command -VMName $vm -Credential $cred -ArgumentList $payloadJson, $vm -ScriptBlock {
      param($payloadJson, $newName)
      $ErrorActionPreference = 'Stop'
      $items = $payloadJson | ConvertFrom-Json
      # 単一要素だと配列にならないため正規化
      if ($items -isnot [System.Array]) { $items = @($items) }
      $changed = $false
      $out = @()
      foreach ($it in $items) {
        $macN = ($it.mac -replace '[-:]', '').ToUpper()
        $nic = Get-NetAdapter | Where-Object { ($_.MacAddress -replace '[-:]', '').ToUpper() -eq $macN } | Select-Object -First 1
        if (-not $nic) { $out += [pscustomobject]@{ switch = $it.switch; ok = $false; err = "NIC not found (MAC=$($it.mac))" }; continue }
        $ifIndex = $nic.ifIndex
        $before  = (Get-NetIPAddress -InterfaceIndex $ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue | Select-Object -First 1).IPAddress
        if ($before -ne $it.ip) {
          Get-NetIPAddress -InterfaceIndex $ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue | Remove-NetIPAddress -Confirm:$false -ErrorAction SilentlyContinue
          Get-NetRoute -InterfaceIndex $ifIndex -DestinationPrefix '0.0.0.0/0' -ErrorAction SilentlyContinue | Remove-NetRoute -Confirm:$false -ErrorAction SilentlyContinue
          if ($it.gateway) {
            New-NetIPAddress -InterfaceIndex $ifIndex -IPAddress $it.ip -PrefixLength $it.prefix -DefaultGateway $it.gateway | Out-Null
          } else {
            New-NetIPAddress -InterfaceIndex $ifIndex -IPAddress $it.ip -PrefixLength $it.prefix | Out-Null
          }
          $changed = $true
        }
        if ($it.dns) { Set-DnsClientServerAddress -InterfaceIndex $ifIndex -ServerAddresses ($it.dns) }
        $after = (Get-NetIPAddress -InterfaceIndex $ifIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue | Where-Object { $_.IPAddress -eq $it.ip } | Select-Object -First 1).IPAddress
        $out += [pscustomobject]@{ switch = $it.switch; mac = $it.mac; before = $before; after = $after; ok = ($after -eq $it.ip) }
      }
      # ホスト名（VM名）設定
      $nameChanged = $false
      if ($env:COMPUTERNAME -ne $newName) { Rename-Computer -NewName $newName -Force | Out-Null; $nameChanged = $true; $changed = $true }
      [pscustomobject]@{ segments = $out; name_changed = $nameChanged; changed = $changed } | ConvertTo-Json -Compress -Depth 5
    }
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
  register: guest_net
  changed_when: '''"changed":true'' in (stdout | default(''''))'
  no_log: true

# --- 3. 全セグメントのIP設定が成功したことを検証する（Windowsのみ） ---
- name: 全セグメントのIP設定を検証する（Windowsのみ）
  ansible.builtin.assert:
    that:
      - "((guest_net.results[idx].stdout | from_json).segments | selectattr('ok', 'equalto', false) | list | length) == 0"
    fail_msg: >-
      一部セグメントのIP設定に失敗しました: {{ item.name }}
      / 詳細: {{ (guest_net.results[idx].stdout | from_json).segments }}
    success_msg: "全セグメントIP設定OK: {{ item.name }}（{{ item.segments | map(attribute='ip') | join(', ') }}）"
    quiet: true
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx

# --- 4. エビデンス出力（セグメント別の前後・ホスト名） ---
- name: 複数セグメント設定の結果をエビデンス出力する
  ansible.builtin.debug:
    msg:
      - "vm       : {{ item.name }}"
      - "segments : {{ (guest_net.results[idx].stdout | from_json).segments }}"
      - "hostname : -> {{ item.name }} (reboot_required={{ (guest_net.results[idx].stdout | from_json).name_changed }})"
  when: item.os_type == 'windows'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx

# --- 5. ホスト名変更を反映するため再起動する（変更時のみ・Windows） ---
- name: ホスト名変更を反映するため再起動する（変更時のみ）
  ansible.windows.win_shell: |
    $sec  = ConvertTo-SecureString '{{ item.guest_admin_password }}' -AsPlainText -Force
    $cred = New-Object System.Management.Automation.PSCredential('{{ item.guest_admin_user }}', $sec)
    Invoke-Command -VMName '{{ item.name }}' -Credential $cred -ScriptBlock { Restart-Computer -Force }
  when:
    - item.os_type == 'windows'
    - '''"name_changed":true'' in (guest_net.results[idx].stdout | default(''''))'
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
  changed_when: true
  no_log: true
