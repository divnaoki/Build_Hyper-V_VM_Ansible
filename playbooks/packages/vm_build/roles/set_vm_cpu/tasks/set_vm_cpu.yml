---
# 種別: ハードウェア構成（vCPU数）
# 対象: Hyper-Vホスト（WinRM）。VMは停止中（起動前）に設定。
# モジュール: microsoft.hyperv.hv_processor（冪等。count で要求値に収束）。
# 前後取得: before は read-only(win_shell) で現値、after はモジュールの登録結果(changed)で確認。
# 変数: VAR_vm。item.cpu_count。

- name: 現在のvCPU数を取得する（before）
  ansible.windows.win_shell: "(Get-VM -Name '{{ item.name }}').ProcessorCount"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: cpu_before
  changed_when: false

- name: vCPU数を設定する（冪等モジュール hv_processor）
  microsoft.hyperv.hv_processor:
    vm_name: "{{ item.name }}"
    count: "{{ item.cpu_count }}"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: cpu_result

- name: vCPU設定の前後差分をエビデンス出力する
  ansible.builtin.debug:
    msg:
      - "vm     : {{ item.name }}"
      - "before : {{ cpu_before.results[idx].stdout | trim }}"
      - "after  : {{ item.cpu_count }} (changed={{ cpu_result.results[idx].changed }})"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
