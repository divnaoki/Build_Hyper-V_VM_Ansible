---
# 種別: ハードウェア構成（メモリ：起動メモリ／動的メモリ）
# 対象: Hyper-Vホスト（WinRM）。VMは停止中に設定。
# モジュール: microsoft.hyperv.hv_memory（冪等）。動的時は min/max も指定、静的時は startup のみ。
# 前後取得: before は read-only(win_shell)、after はモジュール登録結果(changed)で確認。
# 変数: VAR_vm。item.memory_startup_mb / memory_dynamic / memory_min_mb / memory_max_mb。

- name: 現在のメモリ設定を取得する（before）
  ansible.windows.win_shell: |
    $m = Get-VMMemory -VMName '{{ item.name }}'
    "{0};{1}" -f ($m.Startup/1MB), $m.DynamicMemoryEnabled
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: mem_before
  changed_when: false

- name: メモリを設定する（動的メモリ・冪等モジュール hv_memory）
  microsoft.hyperv.hv_memory:
    vm_name: "{{ item.name }}"
    dynamic_memory_enabled: true
    startup_bytes: "{{ item.memory_startup_mb }}MB"
    minimum_bytes: "{{ item.memory_min_mb }}MB"
    maximum_bytes: "{{ item.memory_max_mb }}MB"
  when: item.memory_dynamic | bool
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: mem_dynamic_result

- name: メモリを設定する（静的メモリ・冪等モジュール hv_memory）
  microsoft.hyperv.hv_memory:
    vm_name: "{{ item.name }}"
    dynamic_memory_enabled: false
    startup_bytes: "{{ item.memory_startup_mb }}MB"
  when: not (item.memory_dynamic | bool)
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
  register: mem_static_result

- name: メモリ設定の前後差分をエビデンス出力する
  ansible.builtin.debug:
    msg:
      - "vm     : {{ item.name }}"
      - "before : {{ mem_before.results[idx].stdout | trim }}  (startupMB;dynamic)"
      - "after  : startup={{ item.memory_startup_mb }}MB dynamic={{ item.memory_dynamic }}"
  loop: "{{ VAR_vm }}"
  loop_control:
    label: "{{ item.name }}"
    index_var: idx
