---
# ===========================================================================
# スナップショット(カスタムAMI) から Hyper-V検証ホストを起動する
#  - create_snapshot_ami.yml で作成したAMIを使い、設定済み状態で復元する
#  - userdata は実行しない（WinRM/Hyper-V は元イメージで構成済みのため）
# 実行: ansible-playbook provision_from_snapshot.yml
# 前提: group_vars/all.yml の snapshot_image_id にAMI IDを設定済みであること
# ===========================================================================
- name: Provision Hyper-V host from snapshot AMI
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - group_vars/all.yml
  tasks:
    - name: snapshot_image_id が設定されていることを確認する
      ansible.builtin.assert:
        that:
          - snapshot_image_id is defined
          - snapshot_image_id | length > 0
          - snapshot_image_id is match('^ami-')
        fail_msg: "group_vars/all.yml の snapshot_image_id にAMI ID（ami-...）を設定してください。"
        success_msg: "起動元スナップショットAMI: {{ snapshot_image_id }}"
        quiet: true

    - name: セキュリティグループを作成する（RDP/WinRM を自IPのみ許可）
      amazon.aws.ec2_security_group:
        name: "{{ sg_name }}"
        description: "Hyper-V verification host - RDP/WinRM from my IP"
        region: "{{ aws_region }}"
        vpc_id: "{{ vpc_id }}"
        rules:
          - proto: tcp
            ports: [3389]
            cidr_ip: "{{ my_ip_cidr }}"
            rule_desc: RDP
          - proto: tcp
            ports: [5985, 5986]
            cidr_ip: "{{ my_ip_cidr }}"
            rule_desc: WinRM
      register: sg

    - name: スナップショットAMIからEC2インスタンス（ベアメタル）を起動する
      amazon.aws.ec2_instance:
        name: "{{ instance_name }}"
        region: "{{ aws_region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ snapshot_image_id }}"
        key_name: "{{ key_name }}"
        network_interfaces:
          - assign_public_ip: true
            subnet_id: "{{ vpc_subnet_id }}"
            groups:
              - "{{ sg.group_id }}"
        # ルートボリュームはAMI（スナップショット）の構成をそのまま使用。
        # サイズを広げたい場合のみ volumes を指定する。
        wait: true
        wait_timeout: 1800
        tags:
          Project: hyperv-vm-build
          Role: hyperv-host
          RestoredFrom: "{{ snapshot_image_id }}"
      register: ec2

    - name: 接続情報を表示する
      ansible.builtin.debug:
        msg:
          - "instance_id : {{ ec2.instances[0].instance_id }}"
          - "public_ip   : {{ ec2.instances[0].public_ip_address | default('N/A') }}"
          - "起動元AMI   : {{ snapshot_image_id }}"
          - "→ ../packages/vm_build/inventory.ini の ansible_host に public_ip を設定"
          - "→ ログイン情報はスナップショット元のホストと同じ（Administratorパスワードは取得済みのものを使用）"
